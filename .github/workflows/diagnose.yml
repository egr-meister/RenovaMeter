name: Diagnose Crash

# Builds the release APK and checks whether its arm64 native libraries are
# 16 KB page aligned (the likely cause of the on-device crash). Run manually.
on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Check native lib alignment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Align dependency versions
        run: npx expo install --fix

      - name: Prepare Android build (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Apply Android CI setup
        run: bash android-ci-setup.sh

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Check 16 KB alignment of arm64 native libraries
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "APK: $APK"
          rm -rf /tmp/apkx && mkdir -p /tmp/apkx
          unzip -o -q "$APK" 'lib/arm64-v8a/*' -d /tmp/apkx || true
          echo "==================== ALIGNMENT REPORT ===================="
          bad=0
          for f in /tmp/apkx/lib/arm64-v8a/*.so; do
            [ -e "$f" ] || continue
            # Alignment of the first LOAD segment (0x4000 = 16 KB, 0x1000 = 4 KB)
            align=$(readelf -lW "$f" 2>/dev/null | awk '/LOAD/{print $NF; exit}')
            name=$(basename "$f")
            if [ "$align" = "0x4000" ] || [ "$align" = "0x10000" ]; then
              echo "OK    $name  align=$align"
            else
              echo "NOT16 $name  align=$align"
              bad=$((bad+1))
            fi
          done
          echo "========================================================="
          echo "Also checking zip-alignment (page alignment inside the APK):"
          ${ANDROID_HOME}/build-tools/35.0.0/zipalign -c -P 16 -v 4 "$APK" 2>/dev/null | grep -iE "arm64|Verification" | tail -40 || echo "(zipalign -P check not available)"
          echo "Total NOT-16KB-aligned arm64 libs: $bad"
