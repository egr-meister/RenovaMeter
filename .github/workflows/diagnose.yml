name: Diagnose Crash

# Builds the release APK and runs it on an arm64 emulator (matching the user's
# device architecture) to reproduce the crash and capture logcat. Run manually.
on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Reproduce crash on arm64 emulator
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Align dependency versions
        run: npx expo install --fix

      - name: Prepare Android build (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Apply Android CI setup
        run: bash android-ci-setup.sh

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run app on arm64 emulator and capture logcat
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: arm64-v8a
          target: google_apis
          disable-animations: true
          script: |
            adb logcat -c || true
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            adb shell monkey -p com.renovameter.app -c android.intent.category.LAUNCHER 1 || true
            sleep 25
            adb logcat -d > full-logcat.txt || true
            echo "==================== CRASH EXCERPT ===================="
            grep -nA 40 -iE "FATAL EXCEPTION|AndroidRuntime.*com.renovameter|ReactNativeJS|JavascriptException|ExceptionsManager|UnsatisfiedLinkError" full-logcat.txt | head -250 || true
            echo "==================== END EXCERPT ===================="

      - name: Upload full logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logcat-arm64
          path: full-logcat.txt
