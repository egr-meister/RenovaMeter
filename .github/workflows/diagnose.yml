name: Diagnose Crash

# Builds the release APK, launches it on an emulator, and verifies the app
# stays alive (no "Cannot find native module" / FATAL crash). Run manually.
on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Verify app launches
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Align dependency versions
        run: npx expo install --fix

      - name: Prepare Android build (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Apply Android CI setup
        run: bash android-ci-setup.sh

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Launch app and verify it stays alive
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: |
            adb logcat -c || true
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            adb shell monkey -p com.renovameter.app -c android.intent.category.LAUNCHER 1 || true
            sleep 25
            adb logcat -d > full-logcat.txt || true
            echo "==================== VERDICT ===================="
            PID=$(adb shell pidof com.renovameter.app | tr -d '\r')
            if [ -n "$PID" ]; then
              echo "RESULT: PASS - app process is ALIVE (pid $PID) 25s after launch."
            else
              echo "RESULT: FAIL - app process is NOT running (it crashed)."
            fi
            echo "--- crash / missing-module lines (should be empty if fixed) ---"
            grep -iE "Cannot find native module|FATAL|JavascriptException|libc.*SIGABRT|ReactNativeJS.*Error" full-logcat.txt | head -40 || true
            echo "================================================"

      - name: Upload full logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-logcat
          path: full-logcat.txt
