name: Diagnose Crash

# Boots an Android emulator, installs the release APK, launches it, and captures
# the crash stack trace from logcat. Run manually from the Actions tab.
on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Capture crash logcat
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Align dependency versions
        run: npx expo install --fix

      - name: Prepare Android build (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      # Reproduce the exact release config (minify + optimization) used by the
      # release workflow, so the crash is the same. No signing secrets here, so
      # the release APK is debug-signed (installable on the emulator).
      - name: Apply Android CI setup
        run: bash android-ci-setup.sh

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run app on emulator and capture logcat
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          script: |
            adb logcat -c || true
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            adb shell monkey -p com.renovameter.app -c android.intent.category.LAUNCHER 1 || true
            sleep 25
            adb logcat -d > full-logcat.txt || true
            echo "==================== CRASH EXCERPT ===================="
            grep -iE "FATAL EXCEPTION|AndroidRuntime|ReactNativeJS|JavascriptException|ExceptionsManager|UnsatisfiedLinkError|ClassNotFound|NoSuchMethod|com\.renovameter|expo\.modules|Hermes|libhermes|SoLoader" full-logcat.txt | head -200 || true
            echo "==================== END EXCERPT ===================="

      - name: Upload full logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logcat
          path: full-logcat.txt
