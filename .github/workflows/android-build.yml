name: Android Build

# Build a signed release APK and AAB for RenovaMeter.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Node.js (no npm cache: this project has no package-lock.json)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install JDK 17 (required by the Android Gradle Plugin)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 4. Set up the Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 5. Install project dependencies
      - name: Install dependencies
        run: npm install

      # 6. Generate a clean native Android project with Expo prebuild
      - name: Prepare Android build (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      # 7. Configure release signing from GitHub Secrets.
      #    If no secrets are set, the release falls back to debug signing
      #    so the build still succeeds.
      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/renovameter-release-key.keystore
            {
              echo "storeFile=renovameter-release-key.keystore"
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
            } > android/keystore.properties
            echo "Release signing configured from secrets."
          else
            echo "No signing secrets found - release will be debug-signed."
          fi

      # 8. Inject the signing config and enable production optimization
      - name: Apply Android CI setup
        run: bash android-ci-setup.sh

      # 9. Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 10. Build the release APK
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # 11. Build the release AAB
      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      # 12. Rename outputs to predictable names
      - name: Rename artifacts
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk renovameter-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab renovameter-release.aab

      # 13. Upload the APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: renovameter-release-apk
          path: renovameter-release.apk

      # 14. Upload the AAB artifact
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: renovameter-release-aab
          path: renovameter-release.aab
